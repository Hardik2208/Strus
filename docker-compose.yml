services:
  postgres:
    image: postgres:16

    container_name: strus-postgres

    restart: unless-stopped

    environment:
      POSTGRES_DB: strus
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres

    ports:
      - "5432:5432"

    volumes:
      - postgres-data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine

    container_name: strus-redis

    restart: unless-stopped

    command:
      - redis-server
      - --appendonly
      - yes

    ports:
      - "6379:6379"

    volumes:
      - redis-data:/data

    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./strus-backend

    container_name: strus-backend

    restart: unless-stopped

    working_dir: /app

    env_file:
      - ./strus-backend/.env

    volumes:
      - ./strus-backend:/app
      - /app/node_modules

    command: >
      sh -c "
      npx prisma generate &&
      npx prisma db push &&
      npm run dev
      "

    ports:
      - "3000:3000"

    depends_on:
      postgres:
        condition: service_healthy

      redis:
        condition: service_healthy

volumes:
  postgres-data:

  redis-data: